<!doctype html>
<html lang="hi" translate="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="google" content="notranslate" />
<meta name="theme-color" content="#fff6e8" />
<title>बाबा की मदद - Baba Help</title>
<link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;🏠&lt;/text&gt;&lt;/svg&gt;" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans",
      "Noto Sans Devanagari", sans-serif;
    color: #2a1d12; background: #fff6e8; overflow: hidden;
  }

  /* ============================ DISPLAY (always Hindi) ============================ */
  #display {
    position: fixed; inset: 0; z-index: 1; display: flex; flex-direction: column;
    background: linear-gradient(160deg, var(--bg1, #fff6e8) 0%, var(--bg2, #ffe4b3) 100%);
    color: var(--ink, #3a2710); user-select: none;
    transition: background 2s linear, color 2s linear;
  }
  #display[data-tone="night"] { --ink: #fff3e2; --ink-soft: #e9cba6; }
  #display[data-tone="morning"], #display[data-tone="day"], #display[data-tone="evening"] { --ink: #3a2710; --ink-soft: #7a5a33; }

  .bh { flex: 0 0 auto; text-align: center; padding: clamp(12px,2.4vh,26px) 16px clamp(6px,1.2vh,14px); }
  /* Sizing uses vmin (smaller viewport side) so text fits BOTH tall phones and
     short/wide laptops without overflowing. */
  .bh-greet { font-size: clamp(22px,4.2vmin,46px); font-weight: 700; }
  .bh-clock { display: flex; align-items: baseline; justify-content: center; gap: .3em; margin: .02em 0; }
  .bh-time { font-size: clamp(56px,13vmin,150px); font-weight: 800; line-height: .95; font-variant-numeric: tabular-nums; }
  .bh-part { font-size: clamp(20px,3.6vmin,44px); font-weight: 600; color: var(--ink-soft, #7a5a33); }
  .bh-date { font-size: clamp(17px,3vmin,34px); font-weight: 600; color: var(--ink-soft, #7a5a33); }

  .stage-wrap { position: relative; flex: 1 1 auto; min-height: 0; }
  .stage { position: absolute; inset: 0; }
  .layer { position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease-in-out; will-change: opacity; }
  .layer.on { opacity: 1; }
  @media (prefers-reduced-motion: reduce) { .layer { transition: opacity .3s linear; } }

  .slide { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: clamp(8px,1.8vmin,22px); text-align: center; padding: clamp(12px,2.4vmin,32px) clamp(18px,4vmin,64px); overflow: hidden; }
  .s-icon { font-size: clamp(54px,11vmin,128px); line-height: 1; }
  .s-big { font-size: clamp(30px,6.2vmin,78px); font-weight: 800; line-height: 1.14; max-width: 20ch; }
  .s-sub { font-size: clamp(22px,4.3vmin,50px); font-weight: 600; color: var(--ink-soft); }
  .s-foot { font-size: clamp(18px,3.1vmin,36px); font-weight: 600; opacity: .82; }
  .slide-meal.is-due .s-icon { border-radius: 50%; padding: .12em; box-shadow: 0 0 0 0 rgba(220,120,40,.3); animation: dueGlow 3.2s ease-in-out infinite; }
  @keyframes dueGlow { 0%,100% { box-shadow: 0 0 0 0 rgba(220,120,40,.3); } 50% { box-shadow: 0 0 0 22px rgba(220,120,40,0); } }

  .m-photo-wrap { padding: clamp(5px,1vmin,10px); border-radius: 50%; background: rgba(255,255,255,.5); box-shadow: 0 8px 30px rgba(0,0,0,.14); }
  .m-name { font-size: clamp(34px,6.8vmin,88px); font-weight: 800; }
  .m-time { font-size: clamp(24px,4.8vmin,56px); font-weight: 700; color: var(--ink-soft); }
  .m-count { font-size: clamp(20px,3.8vmin,44px); font-weight: 600; opacity: .85; }
  .m-here { font-size: clamp(30px,5.8vmin,74px); font-weight: 800; color: #1f7a3a; background: rgba(46,160,80,.16); padding: .1em .5em; border-radius: .35em; }
  #display[data-tone="night"] .m-here { color: #7fe6a0; }
  .m-note { font-size: clamp(24px,4.8vmin,54px); font-weight: 700; line-height: 1.18; max-width: 18ch; color: var(--ink-soft); }

  .fam-head { font-size: clamp(28px,5.4vmin,66px); font-weight: 800; margin-bottom: .1em; }
  .fam-grid { display: grid; gap: clamp(12px,2.4vmin,32px); grid-template-columns: repeat(auto-fit,minmax(clamp(90px,15vmin,150px),1fr)); width: 100%; max-width: 1100px; justify-items: center; }
  .fam-cell { display: flex; flex-direction: column; align-items: center; gap: .3em; }
  .fam-name { font-size: clamp(17px,2.9vmin,34px); font-weight: 700; }

  /* Responsive avatar sizes for the display (panel avatars keep fixed px). */
  .avatar.av-member { width: clamp(120px,24vmin,300px); height: clamp(120px,24vmin,300px); font-size: clamp(50px,10vmin,126px); }
  .avatar.av-fam { width: clamp(84px,14vmin,150px); height: clamp(84px,14vmin,150px); font-size: clamp(34px,5.9vmin,63px); }

  /* Message takeover - a distinct "note" screen, shown briefly then it expires */
  /* Solid backdrop (same gradient as the display) so the rotating slides
     behind are fully covered - the message is its own clean screen. */
  .msg-screen { position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    padding: clamp(10px,2.5vmin,36px); background: linear-gradient(160deg, var(--bg1,#fff6e8) 0%, var(--bg2,#ffe4b3) 100%); }
  .msg-screen.show { display: flex; animation: msgIn .6s ease-out both; }
  @keyframes msgIn { from { opacity: 0; transform: scale(.97); } to { opacity: 1; transform: scale(1); } }
  .msg-card {
    width: 100%; max-width: min(1000px, 94%); max-height: 100%; overflow-y: auto;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: clamp(10px,2.4vmin,28px);
    background: #fffaf0; border: 3px solid #e8c98a; border-radius: 32px;
    box-shadow: 0 18px 60px rgba(0,0,0,.18); padding: clamp(18px,3.6vmin,48px); text-align: center; color: #3a2710;
  }
  .msg-emoji { font-size: clamp(46px,8.5vmin,104px); line-height: 1; }
  .msg-label { font-size: clamp(22px,3.8vmin,44px); font-weight: 700; color: #b07b27; letter-spacing: .5px; }
  .msg-big { font-size: clamp(32px,6.2vmin,80px); font-weight: 800; line-height: 1.18; max-width: 16ch; }

  /* ============================ GEAR ============================ */
  #gear { position: fixed; right: 14px; bottom: 12px; z-index: 5; width: 54px; height: 54px; border-radius: 50%; border: none;
    background: rgba(0,0,0,.12); color: #2a1d12; font-size: 26px; cursor: pointer; opacity: .35; transition: opacity .2s; }
  #gear:hover, #gear:focus-visible { opacity: .9; outline: none; }
  /* Manual "next" button (bottom-left), to skip ahead in the carousel. */
  #next { position: fixed; left: 14px; bottom: 12px; z-index: 5; width: 56px; height: 56px; border-radius: 50%; border: none;
    background: rgba(0,0,0,.12); color: #2a1d12; font-size: 30px; line-height: 1; cursor: pointer; opacity: .4; transition: opacity .2s, transform .05s; }
  #next:hover, #next:focus-visible { opacity: .9; outline: none; }
  #next:active { transform: scale(.94); }

  /* ============================ AVATAR ============================ */
  .avatar { display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; overflow: hidden;
    background: #d9d2c7; color: #fff; font-weight: 700; line-height: 1; box-shadow: 0 2px 8px rgba(0,0,0,.18); flex: 0 0 auto; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ============================ PANEL (always English) ============================ */
  #panel { position: fixed; inset: 0; z-index: 10; overflow-y: auto; background: #f6f1e8; color: #1c2330; padding: 18px; }
  #panel[hidden] { display: none; }
  .panel-inner { max-width: 640px; margin: 0 auto; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
  .panel-head h1 { font-size: 1.55rem; margin: 0; }
  .btn-close { background: #2a2118; color: #fff; border: none; border-radius: 12px; padding: 11px 18px; font-size: 1rem; font-weight: 700; cursor: pointer; }
  .card { background: #fff; border-radius: 18px; padding: 16px; margin: 14px 0; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .card h2 { font-size: 1.15rem; margin: 0 0 4px; }
  .card .sub { font-size: 1rem; margin: 2px 0 10px; }
  .muted { color: #5a6472; font-size: .95rem; }

  .meal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
  .meal-btn { min-height: 78px; border: 2px solid #e7c98b; border-radius: 14px; background: #fff6e4; font-size: 1.25rem; font-weight: 700; cursor: pointer; color: #5a3d12; }
  .meal-btn:active { transform: scale(.99); }

  .row { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; background: #f1f3f6; margin-top: 8px; }
  .row .grow { flex: 1 1 auto; min-width: 0; }
  .row .name { font-weight: 700; }
  .ellipsis { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  input[type="text"], input[type="time"], textarea { font-size: 1.05rem; padding: 10px 12px; border: 2px solid #cdd6e0; border-radius: 12px; background: #fff; color: #1c2330; }
  input:focus-visible, textarea:focus-visible, button:focus-visible { outline: 3px solid #2f6f4f; outline-offset: 1px; }

  .add-form { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
  .photo-pick { position: relative; width: 60px; height: 60px; cursor: pointer; flex: 0 0 auto; border-radius: 50%; }
  .photo-pick input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .photo-prev { width: 60px; height: 60px; border-radius: 50%; border: 2px dashed #c9bfa9; background: #efe9df; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #8a7f6c; background-size: cover; background-position: center; }
  .photo-prev.has { border-style: solid; color: transparent; }
  .add-name { flex: 1 1 140px; min-width: 120px; }
  .btn-primary { border: none; border-radius: 12px; padding: 12px 20px; font-size: 1.05rem; font-weight: 700; background: #2f7d4f; color: #fff; cursor: pointer; }
  .btn-small { border: 1px solid #d6b6b6; background: #fff; color: #b3261e; border-radius: 9px; padding: 7px 12px; font-size: .9rem; cursor: pointer; }
  .btn-toggle { border: 1px solid #c5cdd8; background: #fff; color: #46505e; border-radius: 9px; padding: 8px 12px; font-size: .9rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .btn-toggle.on { background: #def3e4; color: #1f7a3a; border-color: #9bd6ad; }
  .btn-toggle:disabled { opacity: .4; cursor: default; }
  .member-photo { cursor: pointer; position: relative; }
  .member-photo input { display: none; }
  .col { display: flex; flex-direction: column; gap: 2px; }
  .col label { font-size: .75rem; color: #6b7480; font-weight: 600; }
  .mcard { background: #f1f3f6; border-radius: 14px; padding: 12px; margin-top: 10px; }
  .mcard-top { display: flex; align-items: center; gap: 10px; }
  .mcard-row { display: flex; align-items: flex-end; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
  .mcard-note { margin-top: 10px; }
  .mcard-note input { width: 100%; }
  .status-line { min-height: 1.3em; font-size: .95rem; font-weight: 600; margin-top: 6px; }
  .status-line.err { color: #b3261e; } .status-line.ok { color: #2f6f4f; }

  .mic-btn { width: 100%; min-height: 84px; border: 3px solid #2f6f4f; border-radius: 16px; background: #eafaf0; color: #16432e; font-size: 1.3rem; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
  .mic-btn.listening { border-color: #b23b3b; background: #fdeaea; color: #7a1f1f; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(178,59,59,.35); } 50% { box-shadow: 0 0 0 14px rgba(178,59,59,0); } }
  @media (prefers-reduced-motion: reduce) { .mic-btn.listening { animation: none; } }
  .interim { min-height: 1.3em; font-style: italic; color: #5a6472; }
  .msg-area { width: 100%; min-height: 84px; font-size: 1.25rem; resize: vertical; }
  .msg-actions { display: flex; gap: 10px; margin-top: 10px; }
  .msg-actions button { flex: 1; min-height: 58px; }
  .btn-clear { background: #f1f3f6; color: #7a1f1f; border: 2px solid #d9b0b0; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; }
  .btn-clear:disabled { opacity: .45; cursor: default; }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: .9rem; font-weight: 600; color: #46505e; }

  #toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); z-index: 50; background: #2a2118; color: #fff; padding: 12px 22px; border-radius: 999px; font-weight: 700; opacity: 0; transition: opacity .2s; pointer-events: none; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="display" data-tone="day">
  <header class="bh">
    <div class="bh-greet" id="greet"></div>
    <div class="bh-clock"><span class="bh-time" id="clockTime">--:--</span><span class="bh-part" id="clockPart"></span></div>
    <div class="bh-date" id="dateLine"></div>
  </header>
  <div class="stage-wrap">
    <main class="stage" aria-live="polite">
      <div class="layer on" id="layerA"></div>
      <div class="layer" id="layerB"></div>
    </main>
    <div class="msg-screen" id="msgScreen" aria-live="polite"></div>
  </div>
</div>

<button id="gear" aria-label="Family controls">&#9881;</button>
<button id="next" aria-label="अगला (next)">&#8594;</button>

<div id="panel" hidden>
  <div class="panel-inner">
    <div class="panel-head">
      <h1 id="panelTitle"></h1>
      <button class="btn-close" id="closeBtn"></button>
    </div>

    <div class="card">
      <h2 id="logMealTitle"></h2>
      <div class="meal-grid" id="mealBtns"></div>
      <h2 id="todaysMealsTitle" style="margin-top:14px;font-size:1rem;"></h2>
      <div id="mealsToday"></div>
    </div>

    <div class="card">
      <h2 id="addMemberTitle"></h2>
      <p class="muted sub" id="addMemberSub"></p>
      <form class="add-form" id="addForm" autocomplete="off">
        <label class="photo-pick"><input type="file" id="photoInput" accept="image/*" /><span class="photo-prev" id="photoPrev" aria-hidden="true">+</span></label>
        <input type="text" class="add-name" id="nameInput" maxlength="40" />
        <button type="submit" class="btn-primary" id="addBtn"></button>
        <div class="status-line" id="memberMsg" role="status" aria-live="polite"></div>
      </form>
      <div id="memberList" style="margin-top:8px;"></div>
    </div>

    <div class="card">
      <h2 id="messageTitle"></h2>
      <p class="muted sub" id="messageSub"></p>
      <button class="mic-btn" id="micBtn" type="button"></button>
      <div class="interim" id="interim" aria-live="polite"></div>
      <div class="status-line" id="vmStatus" role="status" aria-live="polite"></div>
      <textarea class="msg-area" id="msgText"></textarea>
      <div class="msg-actions">
        <button class="btn-primary" id="sendMsgBtn" type="button"></button>
        <button class="btn-clear" id="clearMsgBtn" type="button"></button>
      </div>
      <div class="muted" id="msgCurrent" style="margin-top:10px;"></div>
    </div>

    <div class="card">
      <h2 id="settingsTitle"></h2>
      <div class="field" style="margin-bottom:12px;">
        <label id="babaNameLabel"></label>
        <input type="text" id="babaNameInput" maxlength="30" />
      </div>
      <label class="muted" id="mealTimesLabel"></label>
      <div class="settings-grid" id="schedGrid" style="margin-top:8px;"></div>
    </div>
  </div>
</div>

<div id="toast"></div>
<noscript>This screen needs JavaScript turned on.</noscript>

<script>
"use strict";

/* Baba's display is ALWAYS Hindi (with Latin/English numbers).
   The family panel is ALWAYS English. */
var DISP = "hi";   // display language
var PAN = "en";    // panel language

/* ============================================================
   STRINGS + FORMATTERS. All digits are ALWAYS Latin in both
   languages (every number concatenated by hand). Baba-facing
   Hindi is warm, verb-light and gender-neutral; Hindi gender
   agreement is baked into per-meal strings, not templated.
   ============================================================ */
var T = {
  hi: {
    greetings: { morning: "सुप्रभात", afternoon: "नमस्ते", evening: "शुभ संध्या", night: "शुभ रात्रि" },
    parts: { morning: "सुबह", afternoon: "दोपहर", evening: "शाम", night: "रात" },
    meals: {
      breakfast: { name: "नाश्ता", obl: "नाश्ते", done: "नाश्ता हो गया" },
      lunch: { name: "दोपहर का खाना", obl: "दोपहर के खाने", done: "दोपहर का खाना हो गया" },
      snack: { name: "शाम की चाय", obl: "शाम की चाय", done: "शाम की चाय हो गई" },
      dinner: { name: "रात का खाना", obl: "रात के खाने", done: "रात का खाना हो गया" }
    },
    mealName: function (t) { return this.meals[t].name; },
    mealNow: function (t) { return "अब " + this.meals[t].obl + " का समय है"; },
    justEaten: "आपने अभी-अभी खाना खाया है",
    full: "पेट भरा है - अभी और खाने की ज़रूरत नहीं",
    ate: function (t, ts) { return this.meals[t].done + ", " + ts; },
    nextMeal: function (t, ts) { return "इसके बाद: " + this.meals[t].name + ", " + ts; },
    hereBadge: "घर पे हैं ✓",
    inHours: function (n) { return "लगभग " + n + " घंटे में"; },
    inMinutes: function (n) { return "लगभग " + n + " मिनट में"; },
    now: "अभी",
    yourFamily: "आपका परिवार",
    messageHeading: "परिवार का संदेश"
  },
  en: {
    greetings: { morning: "Good morning", afternoon: "Good afternoon", evening: "Good evening", night: "Good night" },
    parts: { morning: "morning", afternoon: "afternoon", evening: "evening", night: "night" },
    meals: {
      breakfast: { name: "Breakfast", lower: "breakfast" },
      lunch: { name: "Lunch", lower: "lunch" },
      snack: { name: "Evening tea", lower: "evening tea" },
      dinner: { name: "Dinner", lower: "dinner" }
    },
    mealName: function (t) { return this.meals[t].name; },
    inHours: function (n) { return "in about " + n + (n === 1 ? " hour" : " hours"); },
    inMinutes: function (n) { return "in about " + n + (n === 1 ? " minute" : " minutes"); },
    now: "now",
    ctl: {
      panelTitle: "Family panel", logMeal: "Log a meal", todaysMeals: "Today's meals",
      addMember: "Add a family member", addMemberSub: "Add a photo and a name. Set their daily arrival time below.",
      name: "Name", add: "Add", comingAt: "Comes at", atHome: "At home", atHomeHint: "Tap when this person is currently at home", tapToChange: "Tap photo to change",
      note: "Note (optional)", notePlaceholder: "e.g. travelling - back in 3 days",
      message: "Message for Baba", messageSub: "Speak in Hindi (or type). It shows on Baba's screen for about 10 seconds, then clears.",
      sendToScreen: "Send to screen", clearMessage: "Clear now",
      settings: "Settings", mealTimes: "Meal times", babaName: "Baba's name",
      delete: "Delete", close: "Close",
      noMeals: "Nothing logged yet", noMembers: "No family members yet", namePrompt: "Please enter a name",
      photoTooBig: "Photo too large or too many photos - remove one and retry"
    },
    voice: {
      micIdle: "Tap to speak (in Hindi)", micListening: "Listening... tap to stop",
      placeholder: "Speak in Hindi, or type a message for Baba...", listening: "Listening...",
      sent: "Sent to Baba's screen", cleared: "Cleared from the screen", empty: "Speak or type something first",
      typeHint: "Speech input is not available in this browser - please type.",
      curPrefix: "Now showing:", curNone: "No message showing right now",
      errPerm: "Microphone blocked. Open via localhost (not file://) and allow the mic.",
      errNoSpeech: "Did not catch that - tap and speak again.", errNetwork: "Speech recognition needs internet.",
      errMic: "No microphone found - check the device.", errGeneric: "Speech recognition had a problem."
    }
  }
};

var WD = {
  hi: ["रविवार", "सोमवार", "मंगलवार", "बुधवार", "गुरुवार", "शुक्रवार", "शनिवार"],
  en: ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"]
};
var MO = {
  hi: ["जनवरी", "फ़रवरी", "मार्च", "अप्रैल", "मई", "जून", "जुलाई", "अगस्त", "सितंबर", "अक्टूबर", "नवंबर", "दिसंबर"],
  en: ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"]
};

function partOfDay(d) { var h = d.getHours(); if (h >= 4 && h < 12) return "morning"; if (h >= 12 && h < 17) return "afternoon"; if (h >= 17 && h < 21) return "evening"; return "night"; }
function greeting(d, lang) { return T[lang].greetings[partOfDay(d)]; }
function fmtClock(d) { var h = d.getHours() % 12; if (h === 0) h = 12; var m = d.getMinutes(); return h + ":" + (m < 10 ? "0" + m : "" + m); }
function clockPart(d, lang) { return T[lang].parts[partOfDay(d)]; }
function fmtTime(d, lang) {
  d = (d instanceof Date) ? d : new Date(d);
  var clock = fmtClock(d);
  if (lang === "hi") return T.hi.parts[partOfDay(d)] + " " + clock + " बजे";
  return clock + " " + (d.getHours() < 12 ? "AM" : "PM");
}
function fmtDate(d, lang) { return WD[lang][d.getDay()] + ", " + d.getDate() + " " + MO[lang][d.getMonth()]; }
function countdown(targetTs, nowTs, lang) {
  var diff = targetTs - nowTs;
  if (diff < 60000) return T[lang].now;
  var mins = Math.round(diff / 60000);
  if (mins < 60) return T[lang].inMinutes(mins);
  return T[lang].inHours(Math.round(mins / 60));
}

    return {

      members: Array.isArray(p.members) ? p.members : [],

function mealStatus(now) {
  now = now || new Date(); var nowMs = now.getTime(), today = ymd(now);
  function eatenToday(type) { return state.meals.some(function (m) { return m.type === type && ymd(new Date(m.ts)) === today; }); }
  var due = null;
  for (var i = 0; i < MEAL_ORDER.length; i++) {
    var t = MEAL_ORDER[i]; if (!state.schedule[t] || eatenToday(t)) continue;
    var s = atTime(state.schedule[t], now); if (!s) continue;
    if (nowMs >= s.getTime() && nowMs < s.getTime() + DUE_WINDOW) { due = { type: t, ts: s.getTime() }; break; }
  }
  var last = null;
  state.meals.forEach(function (m) { if (ymd(new Date(m.ts)) === today && (!last || m.ts > last.ts)) last = m; });
  var minsSinceLast = last ? Math.max(0, Math.round((nowMs - last.ts) / 60000)) : null;
  var next = null;
  for (var k = 0; k < MEAL_ORDER.length; k++) {
    var t2 = MEAL_ORDER[k]; if (!state.schedule[t2] || eatenToday(t2)) continue;
    var s2 = atTime(state.schedule[t2], now); if (s2 && s2.getTime() > nowMs) { next = { type: t2, ts: s2.getTime() }; break; }
  }
  if (!next) { var tom = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1); var b = atTime(state.schedule.breakfast || "08:00", tom); next = { type: "breakfast", ts: b ? b.getTime() : tom.getTime(), tomorrow: true }; }
  return { due: due, last: last, minsSinceLast: minsSinceLast, next: next };
}
function mealIcon(t) { return t === "breakfast" ? "🌅" : t === "lunch" ? "🍛" : t === "snack" ? "☕" : "🍲"; }

/* ============================================================
   DISPLAY SLIDES + ROTATOR (Hindi)
   ============================================================ */
var DWELL = 9000;
function slideMeal(now) {
  var H = T.hi, ms = mealStatus(now), icon, big, sub = "", foot = "", due = false;
  if (ms.due) { due = true; icon = mealIcon(ms.due.type); big = H.mealNow(ms.due.type); }
  else if (ms.last && ms.minsSinceLast != null && ms.minsSinceLast <= 90) { icon = "✅"; big = H.justEaten; sub = H.full; foot = H.nextMeal(ms.next.type, fmtTime(ms.next.ts, DISP)); }
  else if (ms.last) { icon = mealIcon(ms.last.type); big = H.ate(ms.last.type, fmtTime(ms.last.ts, DISP)); sub = H.nextMeal(ms.next.type, fmtTime(ms.next.ts, DISP)); }
  else { icon = mealIcon(ms.next.type); big = H.nextMeal(ms.next.type, fmtTime(ms.next.ts, DISP)); sub = ms.next.tomorrow ? "" : countdown(ms.next.ts, now.getTime(), DISP); }
  return { kind: "meal", due: due, html:
    '<div class="s-icon">' + icon + '</div><div class="s-big">' + esc(big) + '</div>' +
    (sub ? '<div class="s-sub">' + esc(sub) + '</div>' : '') + (foot ? '<div class="s-foot">' + esc(foot) + '</div>' : '') };
}
function slideMember(m, now) {
  var info, at = atTime(m.comingAt, now), note = (m.note || "").trim();
  if (note) {
    // Custom note (e.g. "travelling, back in 3 days") overrides everything.
    info = '<div class="m-note">' + esc(note) + '</div>';
  } else if (m.home || (at && now.getTime() >= at.getTime())) {
    // At home: either marked manually, or their daily arrival time has passed.
    info = '<div class="m-here">' + esc(T.hi.hereBadge) + '</div>';
  } else {
    var ts = at ? at.getTime() : now.getTime();
    info = '<div class="m-time">' + esc(fmtTime(ts, DISP)) + '</div><div class="m-count">' + esc(countdown(ts, now.getTime(), DISP)) + '</div>';
  }
  return { kind: "member", html: '<div class="m-photo-wrap">' + avatarHTML(m, 0, "av-member") + '</div><div class="m-name">' + esc(m.name) + '</div>' + info };
}
function slideFamily() {
  var cells = state.members.map(function (m) { return '<div class="fam-cell">' + avatarHTML(m, 0, "av-fam") + '<div class="fam-name">' + esc(m.name) + '</div></div>'; }).join("");
  return { kind: "family", html: '<div class="fam-head">' + esc(T.hi.yourFamily) + '</div><div class="fam-grid">' + cells + '</div>' };
}
// Members to show in rotation: those at home now, or with a daily arrival time.
// At-home members come first, then visitors sorted by arrival time.
function membersComingToday(now) {
  var nowMs = now.getTime();
  function present(m) { var at = atTime(m.comingAt, now); return m.home || (at && nowMs >= at.getTime()); }
  return state.members.filter(function (m) { return m.home || m.comingAt || (m.note && m.note.trim()); })
    .sort(function (a, b) {
      var pa = present(a), pb = present(b);
      if (pa !== pb) return pa ? -1 : 1;       // at-home people first
      var at = a.comingAt || "99:99", bt = b.comingAt || "99:99";
      return at < bt ? -1 : at > bt ? 1 : 0;
    });
}
function buildSlides() {
  var now = new Date(), slides = [slideMeal(now)];
  var coming = membersComingToday(now);
  coming.forEach(function (m) { slides.push(slideMember(m, now)); });
  if (coming.length === 0 && state.members.length > 0) slides.push(slideFamily());
  return slides;
}

var cycle = [], ci = 0, rotTimer = null, clockTimer = null;
function wrapSlide(s) { if (!s) return ""; return '<div class="slide slide-' + s.kind + (s.due ? " is-due" : "") + '">' + s.html + '</div>'; }
function crossfadeTo(s) {
  var a = document.getElementById("layerA"), b = document.getElementById("layerB"); if (!a || !b) return;
  var onEl = a.classList.contains("on") ? a : (b.classList.contains("on") ? b : a), offEl = onEl === a ? b : a;
  offEl.innerHTML = wrapSlide(s); void offEl.offsetWidth; offEl.classList.add("on"); onEl.classList.remove("on");
}
function rotate() { if (ci >= cycle.length) { cycle = buildSlides(); ci = 0; } if (!cycle.length) return; crossfadeTo(cycle[ci++]); }
function startRotation() { if (rotTimer) return; rotTimer = setInterval(rotate, DWELL); }
function stopRotation() { if (rotTimer) { clearInterval(rotTimer); rotTimer = null; } }
// Manual "next": advance immediately and give the new slide a full turn. If a
// message is taking over the screen, dismiss it and return to the carousel.
function manualNext() {
  if (state.message) {
    state.message = null; try { save(); } catch (e) {}
    shownMsgTs = null;
    var screen = document.getElementById("msgScreen");
    if (screen) { screen.classList.remove("show"); screen.innerHTML = ""; }
  }
  stopRotation(); rotate(); startRotation();
}

/* ---- Message takeover: a distinct screen, shown briefly, then it expires ---- */
var MESSAGE_TTL = 10 * 1000;    // a sent message takes over for ~10s, then auto-clears and the carousel resumes
var shownMsgTs = null;          // ts of the message currently painted (avoids rebuilding every tick)
function updateMessageScreen() {
  var screen = document.getElementById("msgScreen"); if (!screen) return;
  var msg = state.message, fresh = msg && (Date.now() - msg.ts) < MESSAGE_TTL;
  if (fresh) {
    if (shownMsgTs !== msg.ts) {   // only (re)build the card when the message changes
      // Just the message text - no heading or label.
      screen.innerHTML = '<div class="msg-card"><div class="msg-big">' + esc(msg.text) + '</div></div>';
      screen.classList.add("show");
      shownMsgTs = msg.ts;
    }
    stopRotation();
  } else {
    var wasShown = screen.classList.contains("show");
    if (msg) { state.message = null; try { save(); } catch (e) {} }      // expired -> clear it
    if (wasShown) { screen.classList.remove("show"); screen.innerHTML = ""; }
    shownMsgTs = null;
    startRotation();
    if (wasShown) rotate();        // jump straight back to a fresh carousel slide
  }
}

function clockTick() {
  var now = new Date();
  document.getElementById("greet").textContent = greeting(now, DISP) + (state.babaName ? " " + state.babaName : "");
  document.getElementById("clockTime").textContent = fmtClock(now);
  document.getElementById("clockPart").textContent = clockPart(now, DISP);
  document.getElementById("dateLine").textContent = fmtDate(now, DISP);
  applyTheme(now);
  updateMessageScreen();
}
function applyTheme(now) {
  var h = now.getHours(), bg1, bg2, tone;
  if (h < 6) { bg1 = "#2b2018"; bg2 = "#43352b"; tone = "night"; }
  else if (h < 11) { bg1 = "#fff3da"; bg2 = "#ffd9a0"; tone = "morning"; }
  else if (h < 16) { bg1 = "#fff6e8"; bg2 = "#ffe4b3"; tone = "day"; }
  else if (h < 20) { bg1 = "#ffe2bf"; bg2 = "#ffb877"; tone = "evening"; }
  else { bg1 = "#33271f"; bg2 = "#523a2b"; tone = "night"; }
  var d = document.getElementById("display"); d.style.setProperty("--bg1", bg1); d.style.setProperty("--bg2", bg2); d.setAttribute("data-tone", tone);
}
function startDisplay() {
  clockTick(); if (clockTimer) clearInterval(clockTimer); clockTimer = setInterval(clockTick, 1000);
  cycle = buildSlides(); ci = 0;
  var a = document.getElementById("layerA"), b = document.getElementById("layerB");
  a.innerHTML = wrapSlide(cycle[ci++]); a.classList.add("on"); b.classList.remove("on"); b.innerHTML = "";
  startRotation();
}
function displayRefresh() {
  cycle = buildSlides(); ci = 0;
  if (!(document.getElementById("msgScreen") || {}).classList || !document.getElementById("msgScreen").classList.contains("show")) rotate();
  updateMessageScreen();
}

/* ============================================================
   PANEL RENDER (English) + actions
   ============================================================ */
var els = {};
function cache() {
  ["greet", "clockTime", "clockPart", "dateLine", "gear", "panel", "panelTitle", "closeBtn",
   "logMealTitle", "mealBtns", "todaysMealsTitle", "mealsToday", "addMemberTitle", "addMemberSub", "addForm",
   "photoInput", "photoPrev", "nameInput", "addBtn", "memberMsg", "memberList", "messageTitle", "messageSub",
   "micBtn", "interim", "vmStatus", "msgText", "sendMsgBtn", "clearMsgBtn", "msgCurrent",
   "settingsTitle", "babaNameLabel", "babaNameInput", "mealTimesLabel", "schedGrid", "toast", "next"
  ].forEach(function (id) { els[id] = document.getElementById(id); });
}
function render() {
  var C = T.en.ctl;
  els.panelTitle.textContent = C.panelTitle;
  els.closeBtn.textContent = C.close;
  els.logMealTitle.textContent = C.logMeal;
  els.todaysMealsTitle.textContent = C.todaysMeals;
  els.addMemberTitle.textContent = C.addMember;
  els.addMemberSub.textContent = C.addMemberSub;
  els.nameInput.placeholder = C.name;
  els.addBtn.textContent = C.add;
  els.messageTitle.textContent = C.message;
  els.messageSub.textContent = C.messageSub;
  els.sendMsgBtn.textContent = C.sendToScreen;
  els.clearMsgBtn.textContent = C.clearMessage;
  els.settingsTitle.textContent = C.settings;
  els.babaNameLabel.textContent = C.babaName;
  els.mealTimesLabel.textContent = C.mealTimes;

  renderMealButtons(); renderMealsToday(); renderMemberList(); renderSchedule(); renderMessagePreview(); refreshVoiceLabels();
  if (document.activeElement !== els.babaNameInput) els.babaNameInput.value = state.babaName;
  displayRefresh();
}
function renderMealButtons() {
  els.mealBtns.innerHTML = "";
  MEAL_ORDER.forEach(function (type) {
    var b = document.createElement("button"); b.className = "meal-btn"; b.textContent = T.en.mealName(type);
    b.addEventListener("click", function () { state.meals.push({ id: uid(), type: type, ts: Date.now() }); save(); render(); toast(T.en.mealName(type) + " ✓"); });
    els.mealBtns.appendChild(b);
  });
}
function renderMealsToday() {
  var C = T.en.ctl, today = ymd(new Date()); els.mealsToday.innerHTML = "";
  var list = state.meals.filter(function (m) { return ymd(new Date(m.ts)) === today; }).sort(function (a, b) { return b.ts - a.ts; });
  if (!list.length) { els.mealsToday.innerHTML = '<div class="muted">' + esc(C.noMeals) + '</div>'; return; }
  list.forEach(function (m) {
    var row = document.createElement("div"); row.className = "row";
    var lab = document.createElement("span"); lab.className = "grow"; lab.textContent = T.en.mealName(m.type) + " · " + fmtTime(m.ts, PAN);
    var del = document.createElement("button"); del.className = "btn-small"; del.textContent = C.delete;
    del.addEventListener("click", function () { state.meals = state.meals.filter(function (x) { return x.id !== m.id; }); save(); render(); });
    row.appendChild(lab); row.appendChild(del); els.mealsToday.appendChild(row);
  });
}
function renderMemberList() {
  var C = T.en.ctl; els.memberList.innerHTML = "";
  if (!state.members.length) { els.memberList.innerHTML = '<div class="muted">' + esc(C.noMembers) + '</div>'; return; }
  state.members.forEach(function (m) {
    var card = document.createElement("div"); card.className = "mcard";

    // Top: avatar (tap to change photo) + name + delete.
    var top = document.createElement("div"); top.className = "mcard-top";
    var pick = document.createElement("label"); pick.className = "member-photo"; pick.title = C.tapToChange;
    pick.innerHTML = avatarHTML(m, 52);
    var fileIn = document.createElement("input"); fileIn.type = "file"; fileIn.accept = "image/*";
    fileIn.addEventListener("change", function () {
      var f = fileIn.files && fileIn.files[0]; if (!f) return;
      compressImage(f, 480, 0.8).then(function (dataUrl) {
        var old = m.photo; m.photo = dataUrl;
        try { save(); } catch (e) { m.photo = old; memberMsg(C.photoTooBig, true); }
        render();
      }).catch(function () {});
    });
    pick.appendChild(fileIn); top.appendChild(pick);
    var nm = document.createElement("div"); nm.className = "grow ellipsis name"; nm.textContent = m.name; top.appendChild(nm);
    var del = document.createElement("button"); del.className = "btn-small"; del.textContent = C.delete;
    del.addEventListener("click", function () { state.members = state.members.filter(function (x) { return x.id !== m.id; }); try { save(); } catch (e) {} render(); });
    top.appendChild(del);
    card.appendChild(top);

    // Controls: daily arrival time (always editable) + "at home" toggle.
    var ctrls = document.createElement("div"); ctrls.className = "mcard-row";
    var timeCol = document.createElement("div"); timeCol.className = "col";
    var tl = document.createElement("label"); tl.textContent = C.comingAt; timeCol.appendChild(tl);
    var time = document.createElement("input"); time.type = "time"; time.value = m.comingAt || "";
    time.addEventListener("change", function () { m.comingAt = time.value || null; save(); render(); });
    timeCol.appendChild(time); ctrls.appendChild(timeCol);
    var home = document.createElement("button"); home.className = "btn-toggle" + (m.home ? " on" : "");
    home.textContent = C.atHome + (m.home ? " ✓" : "");
    home.title = C.atHomeHint;
    home.addEventListener("click", function () { m.home = !m.home; save(); render(); });
    ctrls.appendChild(home);
    card.appendChild(ctrls);

    // Optional custom note (shows on Baba's screen instead of the time).
    var noteCol = document.createElement("div"); noteCol.className = "col mcard-note";
    var nlab = document.createElement("label"); nlab.textContent = C.note; noteCol.appendChild(nlab);
    var note = document.createElement("input"); note.type = "text"; note.value = m.note || ""; note.placeholder = C.notePlaceholder; note.maxLength = 80;
    note.addEventListener("change", function () { m.note = note.value.trim() || null; save(); render(); });
    noteCol.appendChild(note); card.appendChild(noteCol);

    els.memberList.appendChild(card);
  });
}
function renderSchedule() {
  els.schedGrid.innerHTML = "";
  MEAL_ORDER.forEach(function (type) {
    var f = document.createElement("div"); f.className = "field";
    var lab = document.createElement("label"); lab.textContent = T.en.mealName(type);
    var inp = document.createElement("input"); inp.type = "time"; if (document.activeElement !== inp) inp.value = state.schedule[type] || "";
    inp.addEventListener("change", function () { state.schedule[type] = inp.value; save(); render(); });
    f.appendChild(lab); f.appendChild(inp); els.schedGrid.appendChild(f);
  });
}
function renderMessagePreview() {
  var v = T.en.voice;
  els.msgCurrent.textContent = state.message && state.message.text ? (v.curPrefix + " " + state.message.text) : v.curNone;
  els.clearMsgBtn.disabled = !state.message;
}
function memberMsg(text, isError) { els.memberMsg.textContent = text; els.memberMsg.className = "status-line " + (isError ? "err" : "ok"); clearTimeout(memberMsg._t); memberMsg._t = setTimeout(function () { els.memberMsg.textContent = ""; }, 4000); }
function addMember(file, name) {
  var C = T.en.ctl; name = (name || "").trim();
  if (!name) { memberMsg(C.namePrompt, true); return Promise.resolve(false); }
  var p = file ? compressImage(file, 480, 0.8).catch(function () { return null; }) : Promise.resolve(null);
  return p.then(function (photo) {
    var m = { id: uid(), name: name, photo: photo, comingAt: null, arrivedDate: null };
    state.members.push(m);
    try { save(); } catch (e) { state.members.pop(); memberMsg(C.photoTooBig, true); render(); return false; }
    render(); toast(C.add + " ✓"); return true;
  });
}

/* ============================================================
   VOICE -> TEXT (recognition in Hindi; message is for Baba)
   ============================================================ */
var Voice = { supported: false, recog: null, listening: false, base: "", chunk: "" };
function initVoice() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  Voice.supported = !!SR;
  if (Voice.supported) {
    var r = new SR(); Voice.recog = r; r.continuous = true; r.interimResults = true; r.maxAlternatives = 1; r.lang = "hi-IN";
    r.onresult = function (e) {
      var interim = "";
      for (var i = e.resultIndex; i < e.results.length; i++) { var piece = e.results[i][0].transcript; if (e.results[i].isFinal) Voice.chunk += normDigits(piece); else interim += piece; }
      els.msgText.value = Voice.base + Voice.chunk; els.interim.textContent = normDigits(interim);
    };
    r.onstart = function () { Voice.listening = true; reflectMic(); vmStatus(T.en.voice.listening, "ok"); };
    r.onend = function () { Voice.listening = false; els.interim.textContent = ""; reflectMic(); };
    r.onerror = function (e) { if (e.error === "aborted") return; var v = T.en.voice; var map = { "not-allowed": v.errPerm, "service-not-allowed": v.errPerm, "no-speech": v.errNoSpeech, "network": v.errNetwork, "audio-capture": v.errMic }; vmStatus(map[e.error] || v.errGeneric, "err"); };
    els.micBtn.addEventListener("click", toggleMic);
  } else { els.micBtn.style.display = "none"; }
  els.sendMsgBtn.addEventListener("click", sendMessage);
  els.clearMsgBtn.addEventListener("click", clearMessage);
}
function toggleMic() {
  if (!Voice.supported) return;
  if (Voice.listening) { try { Voice.recog.stop(); } catch (e) {} return; }
  Voice.base = els.msgText.value; if (Voice.base && !/\s$/.test(Voice.base)) Voice.base += " ";
  Voice.chunk = ""; els.interim.textContent = ""; vmStatus("", "");
  try { Voice.recog.start(); } catch (e) { try { Voice.recog.stop(); } catch (e2) {} }
}
function reflectMic() { var v = T.en.voice; els.micBtn.classList.toggle("listening", Voice.listening); els.micBtn.textContent = (Voice.listening ? "⏹ " + v.micListening : "🎤 " + v.micIdle); }
function vmStatus(msg, type) { els.vmStatus.textContent = msg || ""; els.vmStatus.className = "status-line " + (type || ""); }
function sendMessage() {
  var t = (els.msgText.value || "").trim(); if (!t) { vmStatus(T.en.voice.empty, "err"); return; }
  if (Voice.listening) { try { Voice.recog.stop(); } catch (e) {} }
  state.message = { text: t, ts: Date.now() }; save(); render(); toast(T.en.voice.sent);
}
function clearMessage() { state.message = null; save(); render(); toast(T.en.voice.cleared); }
function refreshVoiceLabels() { var v = T.en.voice; els.msgText.placeholder = v.placeholder; reflectMic(); if (!Voice.supported) vmStatus(v.typeHint, "ok"); }

/* ============================================================
   WIRING + INIT
   ============================================================ */
var toastTimer = null;
function toast(msg) { els.toast.textContent = msg; els.toast.classList.add("show"); clearTimeout(toastTimer); toastTimer = setTimeout(function () { els.toast.classList.remove("show"); }, 2200); }
function wire() {
  els.gear.addEventListener("click", function () { els.panel.hidden = false; els.gear.style.display = "none"; });
  els.next.addEventListener("click", manualNext);
  els.closeBtn.addEventListener("click", function () { els.panel.hidden = true; els.gear.style.display = ""; });
  els.babaNameInput.addEventListener("input", function () { state.babaName = els.babaNameInput.value; save(); });
  var previewUrl = null;
  els.photoInput.addEventListener("change", function () {
    var f = els.photoInput.files && els.photoInput.files[0];
    if (previewUrl) { URL.revokeObjectURL(previewUrl); previewUrl = null; }
    if (f) { previewUrl = URL.createObjectURL(f); els.photoPrev.style.backgroundImage = "url(" + previewUrl + ")"; els.photoPrev.classList.add("has"); }
    else { els.photoPrev.style.backgroundImage = ""; els.photoPrev.classList.remove("has"); }
  });
  els.addForm.addEventListener("submit", function (e) {
    e.preventDefault(); els.addBtn.disabled = true;
    addMember((els.photoInput.files && els.photoInput.files[0]) || null, els.nameInput.value).then(function () {
      els.addBtn.disabled = false; els.addForm.reset();
      if (previewUrl) { URL.revokeObjectURL(previewUrl); previewUrl = null; }
      els.photoPrev.style.backgroundImage = ""; els.photoPrev.classList.remove("has");
    });
  });
}
function requestWakeLock() {
  if (!navigator.wakeLock) return;
  var req = function () { navigator.wakeLock.request("screen").catch(function () {}); };
  req(); document.addEventListener("visibilitychange", function () { if (document.visibilityState === "visible") req(); });
}
function init() { cache(); prune(); wire(); initVoice(); startDisplay(); render(); requestWakeLock(); }
init();
</script>
